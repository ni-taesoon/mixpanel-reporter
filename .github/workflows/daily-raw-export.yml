name: 일간 Raw 데이터 첨부 발송

on:
  schedule:
    # 매일 KST 오전 8시 (UTC 전일 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: '시작일 (yyyy-mm-dd). 비우면 오늘-6일'
        required: false
      to_date:
        description: '종료일 (yyyy-mm-dd). 비우면 오늘'
        required: false

jobs:
  send-raw:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Python 의존성 설치
        run: pip install -r requirements.txt

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: emails/package-lock.json

      - name: Node.js 의존성 설치
        run: npm ci
        working-directory: emails

      - name: 기간 계산 (API는 UTC, 표시는 KST)
        id: period
        run: |
          # API 요청용 (UTC — Mixpanel Export API가 요구)
          if [ -n "${{ github.event.inputs.to_date }}" ]; then
            UTC_TO="${{ github.event.inputs.to_date }}"
          else
            UTC_TO=$(date -u +%F)
          fi
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            UTC_FROM="${{ github.event.inputs.from_date }}"
          else
            UTC_FROM=$(date -u -d '6 days ago' +%F)
          fi

          # 표시용 (KST — 이메일 제목/본문/파일명)
          if [ -n "${{ github.event.inputs.to_date }}" ]; then
            KST_TO="${{ github.event.inputs.to_date }}"
          else
            KST_TO=$(TZ=Asia/Seoul date +%F)
          fi
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            KST_FROM="${{ github.event.inputs.from_date }}"
          else
            KST_FROM=$(TZ=Asia/Seoul date -d '6 days ago' +%F)
          fi

          echo "utc_from=$UTC_FROM" >> "$GITHUB_OUTPUT"
          echo "utc_to=$UTC_TO" >> "$GITHUB_OUTPUT"
          echo "kst_from=$KST_FROM" >> "$GITHUB_OUTPUT"
          echo "kst_to=$KST_TO" >> "$GITHUB_OUTPUT"
          echo "API 기간 (UTC): $UTC_FROM ~ $UTC_TO"
          echo "표시 기간 (KST): $KST_FROM ~ $KST_TO"

      - name: Mixpanel raw 데이터 수집
        env:
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_PASSWORD: ${{ secrets.MIXPANEL_PASSWORD }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
        run: |
          python3 fetch_data.py \
            --from "${{ steps.period.outputs.utc_from }}" \
            --to "${{ steps.period.outputs.utc_to }}"

      - name: 이벤트 수 계산 및 gzip 압축
        id: archive
        run: |
          TO_DATE="${{ steps.period.outputs.kst_to }}"
          COUNT=$(wc -l < mixpanel-data.jsonb | tr -d ' ')
          FILENAME="mixpanel-raw-${TO_DATE}.jsonl.gz"
          gzip -c mixpanel-data.jsonb > "emails/${FILENAME}"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          ls -lh "emails/${FILENAME}"

      - name: 외부 도메인 리포트 생성
        run: python3 main.py external-report > emails/external-report-data.json

      - name: 첨부 이메일 발송 (외부 도메인 리포트 + Raw 첨부)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          RAW_DATA_MAIL_FROM: ${{ secrets.RAW_DATA_MAIL_FROM || '리포트 <noreply@officemail.app>' }}
          RAW_DATA_MAIL_TO: ${{ secrets.RAW_DATA_MAIL_TO || 'taesoon.park@jiran.com' }}
          RAW_FROM: ${{ steps.period.outputs.kst_from }}
          RAW_TO: ${{ steps.period.outputs.kst_to }}
          RAW_FILE: ${{ steps.archive.outputs.filename }}
          RAW_EVENT_COUNT: ${{ steps.archive.outputs.count }}
          RAW_EXTERNAL_REPORT: external-report-data.json
        run: npx tsx src/send-raw.ts
        working-directory: emails
